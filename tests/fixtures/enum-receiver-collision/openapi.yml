openapi: 3.0.3
info: { title: Widget API, version: 1.0.0 }
paths:
  /widgets:
    get:
      operationId: listWidgets
      tags: [widgets]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Widget' }
components:
  schemas:
    Widget:
      type: object
      properties:
        owner: { $ref: '#/components/schemas/WidgetOwner' }
        binding: { $ref: '#/components/schemas/WidgetBinding' }
    WidgetOwner:
      type: string
      enum: ["self", "spouse", "child"]
    WidgetBinding:
      type: string
      enum: ["cls", "instance", "static"]
