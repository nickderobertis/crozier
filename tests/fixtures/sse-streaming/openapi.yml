openapi: 3.0.1
info:
  title: sse-streaming
  version: ""
paths:
  /messages/stream:
    post:
      operationId: messages_streamMessages
      tags:
        - Messages
      x-fern-streaming:
        format: sse
        chunk-schema-ref: StreamChunk
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream: {}
      security:
        - BearerAuth: []
components:
  schemas:
    StreamChunk:
      title: StreamChunk
      type: object
      properties:
        delta:
          type: string
        done:
          type: boolean
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
