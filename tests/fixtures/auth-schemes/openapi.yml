openapi: 3.0.1
info:
  title: auth-schemes
  version: ""
paths:
  /apikey/whoami:
    get:
      operationId: apiKeyAuth_whoAmI
      tags:
        - ApiKeyAuth
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: string
      security:
        - ApiKeyAuth: []
  /basic/whoami:
    get:
      operationId: basicAuth_whoAmI
      tags:
        - BasicAuth
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: string
      security:
        - BasicAuth: []
  /bearer/whoami:
    get:
      operationId: bearerAuth_whoAmI
      tags:
        - BearerAuth
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: string
      security:
        - BearerAuth: []
  /oauth/token:
    post:
      operationId: oauth_getToken
      tags:
        - Oauth
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
      security:
        - OAuth2: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRequest"
components:
  schemas:
    TokenResponse:
      title: TokenResponse
      type: object
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
      required:
        - access_token
        - expires_in
    TokenRequest:
      title: TokenRequest
      type: object
      properties:
        client_id:
          type: string
        client_secret:
          type: string
      required:
        - client_id
        - client_secret
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BasicAuth:
      type: http
      scheme: basic
    BearerAuth:
      type: http
      scheme: bearer
    OAuth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: /oauth/token
          scopes: {}
