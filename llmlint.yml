# yaml-language-server: $schema=https://raw.githubusercontent.com/nickderobertis/llmlint/main/assets/llmlint.schema.json
#
# The LLM-judge tier — separate from the deterministic `just check` gate.
# Run with `just lint-llm` (or `just lint-llm-diff` for the merge-base
# diff); the diff-scoped run is the blocking PR check, not part of `check`.
# Rules come from the pinned plugins below; tune one in place with
# `override: true`. Bump a plugin's `@version` pin to pull new rules.
version: 1
files:
  # No `include`: llmlint lints the whole tree (exclude + .gitignore honored).
  # List committed files that shouldn't be judged (lock files, generated output).
  exclude:
    - "**/.git/**"
    # Vendored Fern output — the golden target, not crozier's own code, so it is
    # never LLM-judged. This top-level exclude is the single source of truth (the
    # diff-scoped run self-discovers files and honors it; needs llmlint >= 0.3.12).
    - "tests/fixtures/**"
    # screencomp visual-docs artifacts — generated captures, not hand-written
    # code: the committed SVG screenshots (each ~370KB of base64-embedded font),
    # the animated GIF, the digest baseline, and the vendored binary font. They
    # are not authored source to judge, and feeding the megabytes of base64 to the
    # judge overflows it (it returns no parseable JSON). The scripts that PRODUCE
    # them (scripts/screenshots.sh, scripts/demo-gif.py) are code and stay linted.
    - "docs/screenshots/**"
    - "shots/**"
    - "screenshots/fonts/**"
rationales: true
agents:
  default:
    harness: claude-code   # any id from `oneharness list`
plugins:
  - "https://raw.githubusercontent.com/nickderobertis/llmlint/main/assets/config_lint.yml@1"
  - "https://raw.githubusercontent.com/nickderobertis/dero-skills/main/skills/bootstrap/create-repo/assets/llmlint/base.llmlint.yml@1"
  - "https://raw.githubusercontent.com/nickderobertis/dero-skills/main/skills/bootstrap/create-repo/assets/llmlint/shapes/cli.llmlint.yml@1"
  - "https://raw.githubusercontent.com/nickderobertis/dero-skills/main/skills/bootstrap/create-repo/assets/llmlint/languages/rust.llmlint.yml@1"
  # The repo ships several shell scripts (scripts/*.sh); the bash plugin supplies
  # their rules (robust_shell, portable_to_target_shell) and the rule names the
  # scripts' `llmlint: ignore` directives reference.
  - "https://raw.githubusercontent.com/nickderobertis/dero-skills/main/skills/bootstrap/create-repo/assets/llmlint/languages/bash.llmlint.yml@1"
  - "https://raw.githubusercontent.com/nickderobertis/dero-skills/main/skills/bootstrap/create-repo/assets/llmlint/ci.llmlint.yml@1"
