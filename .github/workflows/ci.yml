# Prove the artifact from a clean checkout: bootstrap, then the full gate, on the
# real platform matrix. See docs/matching.md and AGENTS.md.

name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      # rustup honors rust-toolchain.toml (channel + components) on first cargo
      # use, so the pinned toolchain is the single source of truth. Pre-install
      # the dev cargo subcommands as fast prebuilt binaries so `just bootstrap`
      # finds them and skips building from source.
      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-llvm-cov,cargo-deny,cargo-machete

      # Bootstrap installs the pinned `ruff` too (a generation-time dependency —
      # crozier defers Python wrapping to `ruff format`); see
      # scripts/install-ruff.sh and the `.ruff-version` source of truth.
      - name: Bootstrap
        run: just bootstrap

      - name: Check
        run: just check

  # Single stable required-status context aggregating the matrix, so branch
  # protection lists one `gate` name instead of every per-OS leg. Fails unless
  # every gate + install leg succeeded (a skipped/failed `needs` is not success).
  gate:
    name: gate
    needs: [check, install, package, live-e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require all gate jobs to have succeeded
        run: |
          if [ "${{ needs.check.result }}" != "success" ] || [ "${{ needs.install.result }}" != "success" ] || [ "${{ needs.package.result }}" != "success" ] || [ "${{ needs.live-e2e.result }}" != "success" ]; then
            echo "::error::a required gate job did not succeed (check=${{ needs.check.result }}, install=${{ needs.install.result }}, package=${{ needs.package.result }}, live-e2e=${{ needs.live-e2e.result }})" >&2
            exit 1
          fi

  # Live runtime e2e, SEPARATE from `just check` so the core gate stays Node-free:
  # boot a Prism OpenAPI mock server from each fixture's spec and drive the generated
  # SDK through every documented endpoint, asserting a value of the method's declared
  # return type comes back over real HTTP. Complements the byte-diff e2e (source) and
  # the wire tests (request/response shaping vs Fern). Linux-only, like supply-chain.
  live-e2e:
    name: live-e2e
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v2
      # Prism (the mock server) is a Node CLI; install the pinned version globally so
      # `prism` is on PATH (conftest prefers it over an `npx` fetch). Keep the version
      # in step with tests/live_e2e/conftest.py:PRISM_PKG.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g @stoplight/prism-cli@5.14.2
      # uv backs the test venv (httpx/pydantic/pytest/pyyaml) and the ruff install.
      - uses: astral-sh/setup-uv@v8.3.2
      # ruff is crozier's generation-time dependency (it shells out to `ruff format`);
      # install-ruff.sh pins it and exposes ~/.local/bin on PATH for later steps.
      - name: Install ruff
        run: ./scripts/install-ruff.sh
      # cargo is preinstalled and honors rust-toolchain.toml on first use; the recipe
      # builds the release binary the suite drives.
      - name: Live e2e
        run: just test-live-e2e

  # Prove the PUBLISHED crate builds: `cargo publish --dry-run` packages the crate
  # (honoring Cargo.toml's `include`) and compiles from that tarball. This is the
  # only check that catches an include-list gap — e.g. an `include_str!` asset dir
  # left unshipped — which otherwise stays green everywhere (source builds see the
  # full tree) and only breaks the real publish-crate job at release time.
  package:
    name: package
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # cargo is preinstalled and honors rust-toolchain.toml on first use (as the
      # install job and the release crate jobs do); no explicit toolchain step.
      - name: Verify the published crate tarball builds
        run: cargo publish --dry-run --locked

  # Prove the end-user install path (cargo install) and smoke-test the installed
  # binary — separate from the dev bootstrap. This is the path the README tells
  # users to run.
  install:
    name: install (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install crozier (recommended end-user method)
        run: cargo install --path . --locked
      - name: Smoke-test the installed binary
        run: crozier --version

  # PR-title lint: under squash-merge the PR title becomes the release-driving
  # commit, so it must be a valid Conventional Commit. Required check.
  commitlint:
    name: commitlint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # LLM-judge tier (llmlint) — a blocking PR check, SEPARATE from `just check`.
  # Non-deterministic and harness-backed, so it never runs inside the gate. Scoped
  # to the merge-base diff. It REQUIRES its credential and fails fast without it;
  # fork PRs are gated by the repo's require-approval-for-fork-workflows setting.
  llmlint:
    name: llmlint
    if: github.event_name == 'pull_request' && github.event.action != 'edited'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Fetch main (diff base)
        run: git fetch --no-tags --depth=2147483647 origin main
      - uses: extractions/setup-just@v2
      # setup-llmlint.sh installs the llmlint toolchain via `uv tool`; uv is not
      # preinstalled on GitHub runners, so provide it before that step runs.
      - uses: astral-sh/setup-uv@v8.3.2
      # oneharness drives the Claude Code CLI as its harness (llmlint.yml:
      # agents.default.harness = claude-code). The `claude` binary is not on the
      # runner, so install it; it authenticates from CLAUDE_CODE_OAUTH_TOKEN below.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g @anthropic-ai/claude-code
      - name: Install oneharness + llmlint
        run: |
          ./scripts/setup-llmlint.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Validate llmlint config
        run: just lint-llm-validate --diff-base origin/main
      - name: Lint changed files
        env:
          # oneharness drives the `claude` CLI, which reads CLAUDE_CODE_OAUTH_TOKEN
          # from the environment for non-interactive auth. Sync it (and the
          # publishing tokens) from Bitwarden with `gh-secrets sync`; see gh-secrets.json.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "::error::llmlint needs a Claude Code credential. Add CLAUDE_CODE_OAUTH_TOKEN" \
                 "(Settings → Secrets and variables → Actions; sync it via gh-secrets). Fork PRs" \
                 "are gated by the require-approval-for-fork-workflows setting; see AGENTS.md." >&2
            exit 1
          fi
          just lint-llm-diff origin/main
