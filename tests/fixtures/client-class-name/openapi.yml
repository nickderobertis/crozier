openapi: 3.0.3
info: { title: Widget API, version: 1.0.0 }
paths:
  /widgets:
    get:
      operationId: listWidgets
      tags: [widgets]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: array, items: { type: string } }
      security:
        - BearerAuth: []
    post:
      operationId: createWidget
      tags: [widgets]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Widget' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Widget' }
      security:
        - BearerAuth: []
components:
  schemas:
    Widget:
      title: Widget
      type: object
      properties:
        id: { type: string }
        name: { type: string }
      required: [id, name]
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
