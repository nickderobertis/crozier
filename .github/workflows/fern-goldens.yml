name: Fern goldens

on:
  workflow_dispatch:
    inputs:
      fern-version:
        description: Exact fernapi/fern-python-sdk version (blank resolves latest stable tag)
        required: false
        type: string
      fixtures:
        description: Comma-separated CORPUS.md names (blank refreshes existing corpus goldens)
        required: false
        type: string

# A branch gets one queued writer. Runs never cancel one another midway through
# an atomic fixture refresh/push, and different branches remain independent.
concurrency:
  group: fern-goldens-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

# The workflow only reads the public corpus/generator distribution and writes a
# normal commit to the branch selected in the workflow_dispatch UI.
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Require a branch dispatch
        env:
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if [ "$REF_TYPE" != branch ]; then
            echo "::error::Fern goldens must be dispatched on a branch, not a tag." >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - uses: extractions/setup-just@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Fern launcher
        run: npm install -g fern-api

      - name: Build the comment stripper
        run: cargo build --release --locked --bin crozier

      - name: Install pinned ruff
        run: ./scripts/install-ruff.sh

      - name: Generate every selected fixture independently
        id: generation
        continue-on-error: true
        env:
          FERN_VERSION: ${{ inputs.fern-version }}
          FIXTURES: ${{ inputs.fixtures }}
        run: |
          args=()
          if [ -n "$FERN_VERSION" ]; then
            args+=(--version "$FERN_VERSION")
          fi
          if [ -n "$FIXTURES" ]; then
            args+=(--fixtures "$FIXTURES")
          fi
          just fern-goldens-generate "${args[@]}"

      - name: Compare every available golden without fail-fast
        id: comparison
        continue-on-error: true
        run: just fern-goldens-compare

      # Logs, aggregate summaries, a deterministic archive of successful output,
      # and a patch are retained even when a sibling generation or comparison fails.
      - name: Upload generation and comparison evidence
        id: artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: fern-goldens-${{ github.run_id }}-${{ github.run_attempt }}
          path: .local/fern-goldens/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14

      # Publish complete successful fixtures regardless of sibling failures or
      # Crozier differences. The tool stages only successful expected/ trees,
      # verifies origin still equals this checkout, and performs a normal push.
      - name: Publish successful Fern goldens
        id: publication
        if: always()
        continue-on-error: true
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          just fern-goldens-publish "$BRANCH"

      # Defer the red status until evidence is uploaded and every safe successful
      # output has had its normal fast-forward publication attempt.
      - name: Apply final status
        if: always()
        env:
          GENERATION: ${{ steps.generation.outcome }}
          COMPARISON: ${{ steps.comparison.outcome }}
          PUBLICATION: ${{ steps.publication.outcome }}
          ARTIFACTS: ${{ steps.artifacts.outcome }}
        run: |
          if [ "$ARTIFACTS" != success ]; then
            echo "::error::artifact publication did not succeed ($ARTIFACTS)" >&2
            exit 1
          fi
          just fern-goldens-result \
            --generation "$GENERATION" \
            --comparison "$COMPARISON" \
            --publication "$PUBLICATION"
