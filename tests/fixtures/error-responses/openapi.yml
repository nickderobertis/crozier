openapi: 3.0.1
info:
  title: error-responses
  version: ""
paths:
  /widgets/{id}:
    get:
      operationId: widgets_getWidget
      tags:
        - Widgets
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Widget"
        "404":
          description: Not Found
        "500":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      security:
        - BearerAuth: []
  /widgets:
    post:
      operationId: widgets_createWidget
      tags:
        - Widgets
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Widget"
        "400":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: ""
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Widget"
components:
  schemas:
    Widget:
      title: Widget
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
    Error:
      title: Error
      type: object
      properties:
        message:
          type: string
        code:
          type: integer
      required:
        - message
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
