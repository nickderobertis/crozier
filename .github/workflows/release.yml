# Building half of releasing (decoupled from versioning). release-plz opens and
# merges the version-bump PR, then tags `vX.Y.Z` and cuts a GitHub Release with a
# PAT (see release-plz.yml). Because that Release is created with a PAT — not the
# default GITHUB_TOKEN — it fires the `release: published` event below, which:
#   * re-gates on the full `just check` (so a tag never ships an unchecked build),
#   * builds, archives, checksums, and ATTESTS the per-platform binaries,
#   * publishes the crate to crates.io (when CARGO_REGISTRY_TOKEN is set), and
#   * builds PyPI wheels + sdist and publishes them (when PYPI_TOKEN is set).
#
# Every install surface must construct the SAME archive/.sha256 name this produces
# (crozier-<tag>-<target>.tar.gz, .zip on Windows); see scripts/install.sh and the
# README install section. Creating a Release by hand in the GitHub UI is the
# supported manual fallback — it triggers the same event.

name: release

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # Registry publishing self-activates when its credential secret exists — no
  # extra repo variable to set. `secrets` cannot be read in a job `if:`, so this
  # job reads each token into an env var and exposes whether it is present as an
  # output the publish jobs gate on. Until a secret is added, that registry's
  # publish stays dormant while its artifacts still build.
  guard:
    runs-on: ubuntu-latest
    outputs:
      crates: ${{ steps.check.outputs.crates }}
      pypi: ${{ steps.check.outputs.pypi }}
    steps:
      - id: check
        env:
          CARGO_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          if [ -n "$CARGO_TOKEN" ]; then
            echo "crates=true" >> "$GITHUB_OUTPUT"
          else
            echo "CARGO_REGISTRY_TOKEN not set; skipping crates.io publish." >&2
            echo "crates=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$PYPI_TOKEN" ]; then
            echo "pypi=true" >> "$GITHUB_OUTPUT"
          else
            echo "PYPI_TOKEN not set; skipping PyPI publish." >&2
            echo "pypi=false" >> "$GITHUB_OUTPUT"
          fi

  # Gate the release on a passing run of the same full gate CI enforces, so a tag
  # can never publish an artifact that would not pass `just check`.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install just
        uses: extractions/setup-just@v2
      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-llvm-cov,cargo-deny,cargo-machete
      - name: Bootstrap
        run: just bootstrap
      - name: Check
        run: just check

  upload:
    name: upload (${{ matrix.target }})
    needs: test
    permissions:
      contents: write
      # Keyless Sigstore signing: `id-token` mints the GitHub Actions OIDC
      # identity the provenance is bound to; `attestations` records it. No repo
      # secret or long-lived key is involved.
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native runners per target so nothing needs cross-compilation. `ext`
          # names the archive the upload action leaves in the workspace, which the
          # attestation step then signs.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-13
            ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Build, archive, checksum, and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: crozier
          target: ${{ matrix.target }}
          archive: crozier-$tag-$target
          checksum: sha256
          include: README.md,LICENSE,NOTICE,CHANGELOG.md
          token: ${{ secrets.GITHUB_TOKEN }}
      # Sign a Sigstore build-provenance attestation for the archive. The upload
      # action leaves the archive at the workspace root; attesting it here proves
      # the artifact was built by this workflow — a trust root independent of any
      # mirror the archive might later be downloaded from. Keyless: no secret.
      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: crozier-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.ext }}
      # Publish the Sigstore bundle as a release asset (next to the archive and
      # its .sha256). Shipping the bundle — rather than relying on GitHub's
      # attestation API — is what lets scripts/install.sh verify OFFLINE with
      # `cosign` (or `gh --bundle`) after downloading everything from a mirror.
      # The signature is bound to this workflow's OIDC identity, so a mirror
      # serving the bundle cannot forge it.
      - name: Publish attestation bundle to the release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bundle="crozier-${GITHUB_REF_NAME}-${{ matrix.target }}.sigstore.json"
          cp "${{ steps.attest.outputs.bundle-path }}" "$bundle"
          gh release upload "$GITHUB_REF_NAME" "$bundle" --clobber

  # Prove the offline verification path end to end on every real release: install
  # the verifiers the easy ways (the official cosign installer action; `pip
  # install sigstore` from PyPI) and run the EXACT commands scripts/install.sh
  # uses against a just-published archive + its bundle. This is the only place the
  # real invocations meet a genuine GitHub-OIDC-signed bundle, so it keeps
  # install.sh's flags honest — a mismatch reddens the release instead of silently
  # degrading users to the checksum fallback.
  verify-attestation:
    needs: upload
    runs-on: ubuntu-latest
    steps:
      # Pin >= 2.4.0: --new-bundle-format (new Sigstore bundle) lands there, and
      # the action's unpinned default can be older.
      - uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install sigstore==4.3.0
      - name: Verify a release archive against its Sigstore bundle
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="$GITHUB_REF_NAME"
          target="x86_64-unknown-linux-gnu"
          base="crozier-${tag}-${target}"
          # No checkout in this job, so gh cannot infer the repo from git — name
          # it explicitly.
          gh release download "$tag" --repo "$GITHUB_REPOSITORY" --dir . \
            --pattern "${base}.tar.gz" --pattern "${base}.sigstore.json"
          cosign verify-blob-attestation \
            --new-bundle-format \
            --bundle "${base}.sigstore.json" \
            --type "https://slsa.dev/provenance/v1" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/\.github/workflows/release\.yml@" \
            "${base}.tar.gz"
          echo "cosign verified ${base}.tar.gz."
          sigstore verify github \
            --bundle "${base}.sigstore.json" \
            --offline \
            --repository "$GITHUB_REPOSITORY" \
            "${base}.tar.gz"
          echo "sigstore-python verified ${base}.tar.gz."

  # Prove the `curl | sh` install path end to end against the REAL GitHub
  # Release: run scripts/install.sh exactly as a user would — it downloads the
  # just-published archive and verifies it against a trust root independent of
  # the download (the Sigstore bundle via `gh`, which is present on runners, else
  # the canonical checksum) — then smoke-test the installed binary with a real
  # generation. Runs on the platforms the one-line installer targets
  # (Linux/macOS, x86_64 + arm64); Windows installs via cargo/pip (see README).
  verify-install-script:
    name: verify-install-script (${{ matrix.os }})
    needs: upload
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install via scripts/install.sh and smoke-test
        env:
          # install.sh prefers the `gh` verifier (present on runners); it reads a
          # token to reach the attestation trust root. A soft failure there falls
          # back to the canonical checksum, so the token only strengthens the check.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ver="${GITHUB_REF_NAME#v}"
          ./scripts/install.sh --version "$GITHUB_REF_NAME" --to "$RUNNER_TEMP/bin"
          export PATH="$RUNNER_TEMP/bin:$PATH"
          ./scripts/smoke.sh "$ver"
          echo "install.sh install + smoke test passed for crozier $ver on ${{ matrix.os }}"

  # crates.io publishing: runs whenever CARGO_REGISTRY_TOKEN is set (see `guard`).
  # Gated on the same `test` job as the binary upload (so a crate version never
  # publishes without a green gate) but NOT on `upload` — a flaky per-platform
  # binary upload must not block the immutable crate publish, and vice versa.
  publish-crate:
    needs: [guard, test]
    if: ${{ needs.guard.outputs.crates == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rustup honors rust-toolchain.toml on first cargo use, so the pinned
      # channel — not a floating `stable` — is the single source of truth here
      # too (matching `just bootstrap` and the `test` job).
      - name: Install the pinned toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Post-publish gate: prove the just-published version is actually installable
  # from crates.io. Propagation is not instant, so poll the sparse index until the
  # version is queryable, then `cargo install` it and smoke-test the real
  # artifact. A failure here means a broken release (the crate is already public
  # and immutable), not a blocked publish.
  verify-crate:
    needs: [guard, publish-crate]
    if: ${{ needs.guard.outputs.crates == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install the pinned toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - name: Wait for the version to land on crates.io
        run: |
          ver="${GITHUB_REF_NAME#v}"
          index="https://index.crates.io/cr/oz/crozier"
          echo "Waiting for crozier $ver in the crates.io index..."
          for i in $(seq 1 30); do
            if curl -fsSL "$index" 2>/dev/null | grep -q "\"vers\":\"$ver\""; then
              echo "crozier $ver is available in the index."
              exit 0
            fi
            echo "  attempt $i: not indexed yet; sleeping 10s..."
            sleep 10
          done
          echo "::error::crozier $ver did not appear on crates.io within ~5 minutes"
          exit 1
      - name: Install from crates.io and smoke-test
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          cargo install crozier --version "$ver" --locked --root "$RUNNER_TEMP/cargo-install"
          export PATH="$RUNNER_TEMP/cargo-install/bin:$PATH"
          ./scripts/smoke.sh "$ver"

  # PyPI wheels: maturin's `bin` bindings wrap the prebuilt binary in per-platform
  # wheels (the ruff/uv pattern), so `pip install crozier` is a seconds-fast
  # binary install anywhere PyPI is reachable — the quickest trustworthy path in
  # restricted-egress environments where github.com is blocked but package
  # registries are open. Wheels build on every release (unconditioned, so a
  # packaging break is caught even before publishing is activated);
  # maturin-action compiles inside manylinux containers on Linux for broad glibc
  # compatibility. The wheel version comes from Cargo.toml, so release-plz stays
  # the single version driver.
  build-wheels:
    name: build-wheels (${{ matrix.target }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          # Mirror the binary `upload` matrix: native runners per target.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --locked --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist

  # Source distribution: the install fallback for any platform without a prebuilt
  # wheel (musl/Alpine, other arches). `pip install crozier` there builds from
  # source, which needs a Rust toolchain — slower than a wheel but keeps the
  # install path universal.
  build-sdist:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # PyPI publishing: runs whenever PYPI_TOKEN is set (see `guard`). Gathers every
  # wheel + the sdist and uploads them with the token. Trusted Publishing (OIDC)
  # is a keyless alternative to adopt later; the token path is wired now.
  publish-pypi:
    needs: [guard, build-wheels, build-sdist]
    if: ${{ needs.guard.outputs.pypi == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_TOKEN }}

  # Post-publish gate, mirroring verify-crate: prove the just-published version is
  # actually pip-installable. PyPI propagation is not instant, so poll the JSON
  # API until the version is queryable, then install and smoke-test the real
  # wheel. A failure here means a broken release, not a blocked publish.
  verify-pypi:
    needs: [guard, publish-pypi]
    if: ${{ needs.guard.outputs.pypi == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Wait for the version to land on PyPI
        run: |
          ver="${GITHUB_REF_NAME#v}"
          url="https://pypi.org/pypi/crozier/${ver}/json"
          echo "Waiting for crozier $ver on PyPI..."
          for i in $(seq 1 30); do
            if curl -fsSL -o /dev/null "$url" 2>/dev/null; then
              echo "crozier $ver is available on PyPI."
              exit 0
            fi
            echo "  attempt $i: not indexed yet; sleeping 10s..."
            sleep 10
          done
          echo "::error::crozier $ver did not appear on PyPI within ~5 minutes"
          exit 1
      - name: Install from PyPI and smoke-test
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          pip install "crozier==${ver}"
          ./scripts/smoke.sh "$ver"
          echo "PyPI install + smoke test passed for crozier $ver"
