name: Fern goldens

on:
  workflow_dispatch:
    inputs:
      # Blank deliberately starts an upgrade to latest stable; comparison stays red until
      # Crozier's pinned generator metadata/assets and NOTICE match the resolved tag.
      fern-version:
        description: Exact fernapi/fern-python-sdk version (blank resolves latest stable tag)
        required: false
        type: string
      fixtures:
        description: Comma-separated CORPUS.md names (blank refreshes existing corpus goldens)
        required: false
        type: string

# A branch gets one queued writer. Runs never cancel one another midway through
# an atomic fixture refresh/push, and different branches remain independent.
concurrency:
  group: fern-goldens-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

# Read-only is the workflow default. Only the generation/publication job can
# write the selected branch with a normal commit.
permissions:
  contents: read

jobs:
  generate_publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      generation: ${{ steps.generation.outcome }}
      publication: ${{ steps.publication.outcome }}
      generation_evidence: ${{ steps.generation_evidence.outcome }}
    steps:
      - name: Require a branch dispatch
        env:
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if [ "$REF_TYPE" != branch ]; then
            echo "::error::Fern goldens must be dispatched on a branch, not a tag." >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - uses: extractions/setup-just@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Fern launcher
        run: npm install -g fern-api

      - name: Build the comment stripper
        run: cargo build --release --locked --bin crozier

      - name: Install pinned ruff
        run: ./scripts/install-ruff.sh

      - name: Generate every selected fixture independently
        id: generation
        continue-on-error: true
        env:
          FERN_VERSION: ${{ inputs.fern-version }}
          FIXTURES: ${{ inputs.fixtures }}
        run: |
          args=()
          if [ -n "$FERN_VERSION" ]; then
            args+=(--version "$FERN_VERSION")
          fi
          if [ -n "$FIXTURES" ]; then
            args+=(--fixtures "$FIXTURES")
          fi
          just fern-goldens-generate "${args[@]}"

      # Publish complete successful fixtures regardless of sibling failures or
      # later comparison termination. The tool stages only successful expected/
      # trees, verifies origin still equals this checkout, and performs a normal push.
      - name: Publish successful Fern goldens
        id: publication
        if: always()
        continue-on-error: true
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          just fern-goldens-publish "$BRANCH"

      # Persist generation evidence before the comparison job starts. Artifact v4
      # archives are immutable, so comparison gets a separate later artifact.
      - name: Upload generation evidence
        id: generation_evidence
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: fern-goldens-generation-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .local/fern-goldens/fern-version.txt
            .local/fern-goldens/generated.txt
            .local/fern-goldens/current.txt
            .local/fern-goldens/generation-failures.txt
            .local/fern-goldens/generation-summary.txt
            .local/fern-goldens/generation-logs/
            .local/fern-goldens/generated-goldens.tar.gz
            .local/fern-goldens/fern-goldens.patch
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14

  compare:
    needs: generate_publish
    if: always()
    runs-on: ubuntu-latest
    outputs:
      comparison: ${{ steps.comparison.outcome }}
      comparison_evidence: ${{ steps.comparison_evidence.outcome }}
    steps:
      # Resolve the branch again after publication so comparison sees the exact
      # fast-forwarded goldens when publication succeeded.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - uses: extractions/setup-just@v2

      - name: Install pinned ruff
        run: ./scripts/install-ruff.sh

      - name: Compare every available golden without fail-fast
        id: comparison
        continue-on-error: true
        run: just fern-goldens-compare

      - name: Upload comparison evidence
        id: comparison_evidence
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: fern-goldens-comparison-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .local/fern-goldens/comparison-summary.txt
            .local/fern-goldens/comparison.log
            .local/fern-goldens/comparison-fetch-failures.txt
            .local/fern-goldens/comparison-processing-failures.txt
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14

  final_status:
    needs: [generate_publish, compare]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v2

      # Defer red status until early publication, required evidence phases, and
      # the isolated best-effort comparison have all had their attempt.
      - name: Apply final status
        env:
          GENERATION: ${{ needs.generate_publish.outputs.generation }}
          PUBLICATION: ${{ needs.generate_publish.outputs.publication }}
          GENERATION_EVIDENCE: ${{ needs.generate_publish.outputs.generation_evidence }}
          COMPARISON: ${{ needs.compare.outputs.comparison }}
          COMPARISON_EVIDENCE: ${{ needs.compare.outputs.comparison_evidence }}
        run: |
          just fern-goldens-result \
            --generation "$GENERATION" \
            --publication "$PUBLICATION" \
            --generation-evidence "$GENERATION_EVIDENCE" \
            --comparison "$COMPARISON" \
            --comparison-evidence "$COMPARISON_EVIDENCE"
