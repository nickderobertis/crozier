openapi: 3.0.3
info:
  title: fern
  version: 1.0.0
paths:
  /tree:
    post:
      operationId: putTree
      tags:
        - Tree
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TreeNode"
      responses:
        "200":
          description: OK
  /pred:
    post:
      operationId: putPred
      tags:
        - Pred
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Node"
      responses:
        "200":
          description: OK
components:
  schemas:
    TreeNode:
      type: object
      properties:
        value:
          type: string
        children:
          type: array
          items:
            $ref: "#/components/schemas/TreeNode"
    Node:
      title: Node
      oneOf:
        - $ref: "#/components/schemas/AndNode"
        - $ref: "#/components/schemas/LeafNode"
      discriminator:
        propertyName: kind
        mapping:
          and: "#/components/schemas/AndNode"
          leaf: "#/components/schemas/LeafNode"
    AndNode:
      title: AndNode
      type: object
      required:
        - kind
        - children
      properties:
        kind:
          type: string
          enum:
            - and
        children:
          type: array
          items:
            $ref: "#/components/schemas/Node"
    LeafNode:
      title: LeafNode
      type: object
      required:
        - kind
        - name
      properties:
        kind:
          type: string
          enum:
            - leaf
        name:
          type: string
