openapi: 3.0.3
info: { title: Widget API, version: 1.0.0 }
paths:
  /widgets:
    get:
      operationId: listWidgets
      tags: [widgets]
      parameters:
        - name: level
          in: query
          required: false
          schema: { type: string, enum: ["low", "high"] }
      responses: { '200': { description: OK, content: { application/json: { schema: { type: object, properties: { ok: { type: boolean } } } } } } }
