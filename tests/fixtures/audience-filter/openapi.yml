# Each operation carries BOTH audience extensions on purpose: Fern reads
# `x-fern-audiences` to produce the golden tree, while crozier reads its own
# `x-crozier-audiences` — the same dual-vocabulary split as the X-Fern/X-Crozier
# SDK headers. They hold identical values so both tools filter identically.
openapi: 3.0.3
info: { title: Widget API, version: 1.0.0 }
paths:
  /widgets:
    get:
      operationId: listWidgets
      tags: [widgets]
      x-fern-audiences: [public]
      x-crozier-audiences: [public]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Widget' }
  /admin/stats:
    get:
      operationId: getStats
      tags: [admin]
      x-fern-audiences: [internal]
      x-crozier-audiences: [internal]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Stats' }
components:
  schemas:
    Widget:
      type: object
      properties:
        id: { type: string }
        detail: { $ref: '#/components/schemas/WidgetDetail' }
    WidgetDetail:
      type: object
      properties:
        note: { type: string }
    Stats:
      type: object
      properties:
        count: { type: integer }
